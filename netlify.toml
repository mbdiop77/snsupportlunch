# -------------------------------
# Netlify Configuration Flutter Web + Supabase
# -------------------------------

[build]
  command = "export PATH=\"$PATH:$(pwd)/flutter/bin\" && flutter config --enable-web && flutter pub get && flutter build web --release"
  publish = "build/web"

[build.environment]
  # Désactive complètement le scan (solution sûre ici)
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200