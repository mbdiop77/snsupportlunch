# -------------------------------
# Configuration Netlify pour Flutter Web + Supabase
# -------------------------------

[build]
  # Commande corrigée (IMPORTANT : --no-wasm)
  command = """
    export PATH="$PATH:$(pwd)/flutter/bin" &&
    flutter config --enable-web &&
    flutter pub get &&
    flutter build web --release --no-wasm
  """
  
  publish = "build/web"

# Variables d'environnement
[build.environment]
  # Sécurité (optionnel)
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza"

# Redirections (Flutter Web routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200