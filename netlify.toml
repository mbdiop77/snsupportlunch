# -------------------------------
# Netlify Configuration for Flutter Web + Supabase
# -------------------------------

[build]
  # Commande pour préparer le PATH, activer Flutter Web, récupérer les dépendances et build
  command = "export PATH=\"$PATH:$(pwd)/flutter/bin\" && flutter config --enable-web && flutter pub get && flutter build web --release"
  publish = "build/web"

# Variables d'environnement
[build.environment]
  # Supabase URL et Key : définir directement dans Netlify UI pour plus de sécurité
  # SUPABASE_URL = "https://xxxxxx.supabase.co"
  # SUPABASE_ANON_KEY = "xxxxxxxxxxxxxxxxxxxx"

  # Ignorer les faux positifs de secrets dans le SDK Flutter
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza"

# Redirections pour Flutter Web (Navigator 2.0)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200